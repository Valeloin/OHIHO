<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Anneau au dégradé de marque (bleu ciel → teal → vert), comme sur la
         banderole. Remplace l'anneau argenté de la version précédente. -->
    <linearGradient id="ring" x1="18" y1="10" x2="86" y2="92" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/><stop offset="0.5" stop-color="#22d3c4"/><stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <radialGradient id="disc" cx="0.4" cy="0.32" r="0.9">
      <stop offset="0" stop-color="#16273f"/><stop offset="1" stop-color="#0a1524"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="46.5" fill="url(#disc)" stroke="url(#ring)" stroke-width="5"/>
  <!-- Trident : dégradé bleu → teal → vert, barre par barre -->
  <rect x="30" y="28" width="8" height="44" rx="4" fill="#38bdf8"/>
  <rect x="46" y="21" width="8" height="58" rx="4" fill="#22d3c4"/>
  <rect x="62" y="28" width="8" height="44" rx="4" fill="#34d399"/>
</svg>
