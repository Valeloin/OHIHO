<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    Favicon de BugTrack, repris du badge de la barre latérale pour que
    l'onglet du navigateur et l'application portent la même marque.

    Le dessin est celui de l'icône « bug » de lucide-react, tracés copiés
    depuis la bibliothèque et non redessinés. Le bleu est hsl(217 91% 60%),
    valeur de la variable primary en thème sombre : un favicon ne lit pas
    les variables CSS, elle est donc écrite en dur ici. Si le bleu de
    l'application change, ce fichier ne suivra pas tout seul.

    Deux écarts avec la barre latérale, imposés par le format. Le scarabée
    y occupe la moitié du carré, il en occupe ici 59 %, et son trait passe
    de 2 à 2,4. Aux proportions d'origine, à 16 pixels, le trait tombait
    sous les 0,7 pixel et le dessin devenait une tache.
  -->
  <rect width="512" height="512" rx="170" fill="#3B82F6"/>

  <g transform="translate(106 106) scale(12.5)"
     fill="none"
     stroke="#FFFFFF"
     stroke-width="2.4"
     stroke-linecap="round"
     stroke-linejoin="round">
    <path d="M12 20v-9"/>
    <path d="M14 7a4 4 0 0 1 4 4v3a6 6 0 0 1-12 0v-3a4 4 0 0 1 4-4z"/>
    <path d="M14.12 3.88 16 2"/>
    <path d="M21 21a4 4 0 0 0-3.81-4"/>
    <path d="M21 5a4 4 0 0 1-3.55 3.97"/>
    <path d="M22 13h-4"/>
    <path d="M3 21a4 4 0 0 1 3.81-4"/>
    <path d="M3 5a4 4 0 0 0 3.55 3.97"/>
    <path d="M6 13H2"/>
    <path d="m8 2 1.88 1.88"/>
    <path d="M9 7.13V6a3 3 0 1 1 6 0v1.13"/>
  </g>
</svg>
